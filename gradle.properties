kotlin.code.style=official
version = 0.1.0
group = io.github.kormium

# Full multi-target build across all tiers needs more than the default daemon heap.
org.gradle.jvmargs=-Xmx3g -XX:MaxMetaspaceSize=1g -Dfile.encoding=UTF-8

# Publishing secrets (do NOT commit real values). Provide locally via ~/.gradle/gradle.properties
# or in CI via ORG_GRADLE_PROJECT_* env vars. Used by the vanniktech plugin:
#   mavenCentralUsername / mavenCentralPassword   — Central Portal user token (central.sonatype.com)
#   signingInMemoryKey / signingInMemoryKeyPassword — ASCII-armored GPG private key + its password

# Hosts cannot build every declared native target (e.g. Android NDK targets); Kotlin
# auto-disables them — silence the per-target warning.
kotlin.native.ignoreDisabledTargets=true
